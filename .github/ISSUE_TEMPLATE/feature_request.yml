name: Feature request
description: Suggest a new feature or enhancement.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature.

        Before filing, please check:

        - **Non-overlap principle.** `README.md` § "What we explicitly do not
          reinvent" — anything DuckLake already does, we use directly. If your
          feature is "expose DuckLake's `<thing>` through `cdc_*`", the answer
          is usually "use DuckLake's `<thing>` directly." We add only what's
          missing.
        - **Good fit / poor fit.** `docs/performance.md` and
          `docs/decisions/0011-performance-model.md` describe the workloads this
          project targets. If your feature implies a poor-fit workload, the
          feature is unlikely to land in v0.1.
        - **Open questions deferred.** Each ADR in `docs/decisions/` has a
          "Open questions deferred" section. Many "why doesn't it do X?"
          questions are answered there.

        If your feature passes those filters, fill in below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: |
        What problem does this feature solve? Describe the pain point in terms
        of a workflow or use case, not the proposed solution.
      placeholder: |
        I'm building an audit pipeline. When a column is dropped in the same
        snapshot as a DELETE, I lose access to the column's pre-drop values.
    validations:
      required: true

  - type: textarea
    id: workload
    attributes:
      label: Workload
      description: |
        Which workload from `docs/performance.md` or
        `docs/decisions/0011-performance-model.md` does this feature serve? If
        it doesn't fit any of the listed good-fit workloads, the feature is
        unlikely to land in v0.1.
      placeholder: Audit logging and compliance — latency budget hours.

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What would you like to see? Concrete API shape if you have one;
        otherwise the rough behaviour you'd want.
      render: markdown

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        What did you consider that didn't work? Workarounds, existing
        DuckLake / DuckDB features that almost-but-not-quite cover it.

  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        Links to relevant ADRs, docs, related issues, or external prior art.

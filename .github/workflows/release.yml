#
# One-click release automation.
#
# A maintainer triggers this from the Actions UI on `main` (for the next
# minor release line) or on a `release/X.Y` branch (for a patch on a
# previously-published line). On success, this workflow:
#
#   1. Validates the trigger ref and version format against the policy
#      in docs/decisions/0012-branching-ci-release.md and
#      docs/decisions/0013-versioning-and-release-automation.md.
#   2. Verifies that day-to-day CI is green on the trigger SHA.
#   3. Runs the full DuckDB extension distribution matrix (every OS / arch
#      / Wasm triplet) — this is the release-time gate that proves all
#      shipped platforms build cleanly. Day-to-day CI does not pay for
#      this; releases do.
#   4. Creates an annotated git tag (vMAJOR.MINOR.PATCH).
#   5. Creates the maintenance branch `release/MAJOR.MINOR` from the tag
#      if releasing the first patch of a new line.
#   6. Creates a GitHub Release with auto-generated notes (driven by
#      `.github/release.yml` label categories).
#   7. Opens a PR against `duckdb/community-extensions` that updates this
#      extension's descriptor to point at the new tag SHA.
#
# Set `dry_run: true` (the default) the first time you run it on a new
# version. Nothing is pushed, nothing is published; the workflow still
# runs the full matrix so you know all platforms build before you commit
# to a real release.
#
# Set `community_pr_only: true` with `dry_run: false` to retry the
# community-extensions PR step for an already-created release tag. This
# skips the matrix gate (the release was already validated when it was
# cut) and does not create or push tags, maintenance branches, or
# GitHub Releases.
#
# Required secrets:
#   - `COMMUNITY_BOT_TOKEN` — a GitHub PAT that can push to the token
#     owner's fork of `duckdb/community-extensions` and open PRs against
#     the upstream. Only needed for the `community-pr` job; everything
#     else uses the workflow's own `GITHUB_TOKEN`.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0). Must be vMAJOR.MINOR.PATCH; pre-1.0 keeps MAJOR=0.'
        required: true
        type: string
      dry_run:
        description: 'Dry run: validate everything, print the plan, but do not push tags/branches or open PRs.'
        type: boolean
        default: true
      skip_community_pr:
        description: 'Skip the duckdb/community-extensions PR step (use if the PAT is not configured yet, or for a hot patch).'
        type: boolean
        default: false
      community_pr_only:
        description: 'Retry only the duckdb/community-extensions PR step for an existing tag. Requires dry_run: false.'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  EXTENSION_NAME: ducklake_cdc

jobs:
  resolve-duckdb-version:
    name: Resolve DuckDB version
    runs-on: ubuntu-latest
    outputs:
      duckdb_version: ${{ steps.read.outputs.duckdb_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
      - id: read
        run: echo "duckdb_version=$(cat .github/duckdb-version)" >> "$GITHUB_OUTPUT"

  full-matrix-build:
    name: Full extension matrix (release gate)
    needs: resolve-duckdb-version
    # Skip the matrix when retrying just the community-extensions PR for
    # an already-cut release. The matrix already ran when the tag was
    # created; re-running here would burn ~30 minutes of Actions time
    # for no new signal.
    if: ${{ !inputs.community_pr_only }}
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.1
    with:
      duckdb_version: ${{ needs.resolve-duckdb-version.outputs.duckdb_version }}
      ci_tools_version: v1.5.1
      extension_name: ducklake_cdc

  sanitiser-smoke:
    # Per ADR 0001's sanitiser commitment (revised in the same ADR):
    # "every release build runs at least one pass under sanitiser." Day-to-day
    # CI cannot run this — `make debug` enables ASan + UBSan by default
    # (DuckDB CMake adds -fsanitize=address,undefined when CMAKE_BUILD_TYPE=Debug),
    # but the official prebuilt `ducklake.duckdb_extension` is a release
    # binary with no sanitiser runtime, and ASan refuses to LOAD a shared
    # library whose runtime metadata it doesn't recognise. We therefore
    # gate the sanitiser pass on release time and run only the no-DuckLake
    # smoke set (`SQL_TEST_SMOKE_NO_DUCKLAKE` in the Makefile) — exactly
    # the test/sql files that don't `INSTALL ducklake`. Catches compile-time
    # UB, init-time UB in the extension's `Load()` path, global-construction
    # bugs, and the `cdc_version()` hot path. Deeper coverage is gated on
    # upstream DuckLake building under sanitisers, tracked in
    # docs/upstream-asks.md.
    #
    # Build duration expectations: a cold-cache debug+sanitiser build of
    # libduckdb_static + the unittest binary + ducklake_cdc takes ~25-45
    # minutes on ubuntu-22.04 (-O0 + sanitiser instrumentation is ~3x
    # slower than the release build). We skip the DuckDB shell, the
    # benchmark suite, and the default test-dep extensions because the
    # sanitiser smoke set doesn't reach any of them. Subsequent runs hit
    # ccache and complete in ~5-10 minutes.
    name: Sanitiser smoke (ASan + UBSan, no-DuckLake set)
    needs: resolve-duckdb-version
    if: ${{ !inputs.community_pr_only }}
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    env:
      GEN: ninja
      VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
      VCPKG_TARGET_TRIPLET: x64-linux
      # Trim the build to only what `SQL_TEST_SMOKE_NO_DUCKLAKE` needs:
      # libduckdb_static + the unittest binary + ducklake_cdc. The shell,
      # the benchmark suite, and the default test-dep extensions
      # (jemalloc / parquet / etc. that get pulled into CORE_EXTENSIONS
      # via BUILD_EXTENSION_TEST_DEPS=default) are not exercised by the
      # smoke and add ~30-50% to the cold-cache build time.
      BUILD_EXTENSION_TEST_DEPS: 'none'
      EXT_DEBUG_FLAGS: '-DBUILD_SHELL=0 -DBUILD_BENCHMARKS=0'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          # Keep the sanitiser cache distinct from the release cache —
          # ccache hashes the full compile command (sanitiser flags
          # included), so Debug+ASan objects never collide with Release
          # objects anyway, and a shared key just means the two jobs
          # evict each other.
          key: ci-ccache-sanitiser-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'extension_config.cmake', 'vcpkg.json', '.github/duckdb-version') }}-${{ github.ref }}
          restore-keys: |
            ci-ccache-sanitiser-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'extension_config.cmake', 'vcpkg.json', '.github/duckdb-version') }}-
            ci-ccache-sanitiser-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35

      - name: Build (debug, sanitisers on by default)
        # ASan-instrumented compiles peak at 2-3 GB RSS each. Default ninja
        # parallelism on ubuntu-22.04 (4 vCPU) runs 4-6 jobs concurrently,
        # which can exceed the runner's 7 GB RAM and get the build killed
        # by the OOM killer mid-stream (SIGTERM-shaped, not the SIGKILL
        # you'd expect — the parent ninja catches the child kill and
        # propagates as 143). Cap parallelism via
        # `CMAKE_BUILD_PARALLEL_LEVEL=2` (cmake reads this for
        # `cmake --build`, which is what the upstream extension-ci-tools
        # Makefile invokes). Slightly slower wall time, reliably under
        # the memory ceiling.
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: '2'
          NINJA_STATUS: '[%f/%t %es] '
        run: |
          export CCACHE_DIR=~/.ccache
          ccache -M 2G
          # Free swap-able memory before the build; the GitHub runner
          # ships with no swap by default and ASan-instrumented compiles
          # are fragile at the edge.
          free -h
          make debug
          ccache -s
          free -h

      - name: Run no-DuckLake SQL smoke under sanitiser
        env:
          # Surface ASan / UBSan diagnostics as test failures rather than
          # silent process aborts. `print_stacktrace=1` makes the report
          # actually useful when a regression lands.
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:print_stacktrace=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: make test_debug_smoke_no_ducklake

  release:
    name: Tag, release, maintenance branch
    needs:
      - full-matrix-build
      - sanitiser-smoke
    # Run when either:
    #   * both the matrix and sanitiser gates succeeded (normal release / dry run), OR
    #   * we're in community_pr_only mode and both gates were intentionally
    #     skipped (their result is "skipped", not "success").
    if: ${{ always() && ((needs.full-matrix-build.result == 'success' && needs.sanitiser-smoke.result == 'success') || (inputs.community_pr_only && needs.full-matrix-build.result == 'skipped' && needs.sanitiser-smoke.result == 'skipped')) }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ inputs.version }}
      release_sha: ${{ steps.tag.outputs.sha || steps.existing_tag.outputs.sha }}
      maintenance_branch: ${{ steps.branch.outputs.name }}
    steps:
      - name: Validate dispatch mode
        run: |
          if [[ "${{ inputs.community_pr_only }}" == "true" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "::error::community_pr_only retries push a branch and open a PR, so dry_run must be false."
            exit 1
          fi
          if [[ "${{ inputs.community_pr_only }}" == "true" && "${{ inputs.skip_community_pr }}" == "true" ]]; then
            echo "::error::community_pr_only and skip_community_pr cannot both be true."
            exit 1
          fi

      - name: Validate trigger ref
        if: ${{ !inputs.community_pr_only }}
        env:
          REF: ${{ github.ref }}
        run: |
          if [[ "$REF" != "refs/heads/main" && ! "$REF" =~ ^refs/heads/release/[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release must be triggered from main or a release/X.Y branch (got $REF)."
            exit 1
          fi
          echo "Triggered from $REF."

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v(0\.[0-9]+\.[0-9]+|[1-9][0-9]*\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::Version $VERSION must match vMAJOR.MINOR.PATCH where pre-1.0 keeps MAJOR=0."
            exit 1
          fi

      - name: Validate version matches branch policy
        if: ${{ !inputs.community_pr_only }}
        env:
          REF: ${{ github.ref }}
          VERSION: ${{ inputs.version }}
        run: |
          # Strip the leading 'v'.
          stripped="${VERSION#v}"
          major="${stripped%%.*}"
          rest="${stripped#*.}"
          minor="${rest%%.*}"
          patch="${stripped##*.}"

          if [[ "$REF" == "refs/heads/main" ]]; then
            # Releases from main must be a .0 patch (a new minor or major
            # line). Subsequent patches on a published line must be cut
            # from the corresponding release/X.Y branch.
            if [[ "$patch" != "0" ]]; then
              echo "::error::Patch releases (patch != 0) must be triggered from release/$major.$minor, not main."
              exit 1
            fi
          else
            # Triggered from refs/heads/release/X.Y; must match the
            # version's MAJOR.MINOR exactly.
            branch_mm="${REF#refs/heads/release/}"
            if [[ "$branch_mm" != "$major.$minor" ]]; then
              echo "::error::Version $VERSION cannot be released from $REF (expected refs/heads/release/$major.$minor)."
              exit 1
            fi
            # Patches on a maintenance branch must have patch > 0.
            if [[ "$patch" == "0" ]]; then
              echo "::error::A .0 release must be cut from main, not from $REF."
              exit 1
            fi
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify tag does not already exist
        if: ${{ !inputs.community_pr_only }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag $VERSION already exists."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag $VERSION already exists on origin."
            exit 1
          fi

      - name: Resolve existing release tag
        id: existing_tag
        if: ${{ inputs.community_pr_only }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag $VERSION does not exist on origin; community_pr_only can only retry an existing release."
            exit 1
          fi
          git fetch origin "refs/tags/$VERSION:refs/tags/$VERSION"
          echo "sha=$(git rev-list -n 1 "$VERSION")" >> "$GITHUB_OUTPUT"

      - name: Verify day-to-day CI is green at the release SHA
        if: ${{ !inputs.community_pr_only }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          # Branch protection on `main` already requires `CI Pass` to be
          # green before merge, so the latest SHA on `main` should always
          # have it. We re-verify here as belt-and-braces, and so that
          # release-from-release/X.Y also requires a green day-to-day CI
          # run on that branch. The full extension matrix is a separate
          # release-time gate (the `full-matrix-build` job in this
          # workflow) since it only matters when we ship.
          # NOTE: filter API-side via ?check_name= because a release SHA
          # can easily exceed the default 30-result page (full matrix +
          # release jobs all attach checks to the tagged commit).
          status=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs?check_name=CI+Pass&per_page=100" \
            --jq '[.check_runs[] | select(.name == "CI Pass")] | .[0].conclusion // "missing"')
          echo "ci-pass status at $SHA: $status"
          if [[ "$status" != "success" ]]; then
            echo "::error::CI 'CI Pass' check has not succeeded at $SHA. Refusing to release."
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute maintenance branch name
        id: branch
        env:
          VERSION: ${{ inputs.version }}
        run: |
          stripped="${VERSION#v}"
          major="${stripped%%.*}"
          rest="${stripped#*.}"
          minor="${rest%%.*}"
          echo "name=release/$major.$minor" >> "$GITHUB_OUTPUT"
          echo "Maintenance branch: release/$major.$minor"

      - name: Create annotated tag
        id: tag
        if: ${{ !inputs.community_pr_only }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag -a "$VERSION" -m "Release $VERSION"
          echo "sha=$(git rev-list -n 1 "$VERSION")" >> "$GITHUB_OUTPUT"

      - name: Push tag
        if: ${{ !inputs.dry_run && !inputs.community_pr_only }}
        env:
          VERSION: ${{ inputs.version }}
        run: git push origin "refs/tags/$VERSION"

      - name: Create or fast-forward maintenance branch
        if: ${{ !inputs.dry_run && !inputs.community_pr_only }}
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          REF: ${{ github.ref }}
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Maintenance branch $BRANCH already exists; leaving it alone."
            echo "(Patch releases must be cut from the existing branch, not main.)"
          else
            git push origin "HEAD:refs/heads/$BRANCH"
            echo "Created maintenance branch $BRANCH at $GITHUB_SHA."
          fi

      - name: Create GitHub Release with auto-generated notes
        if: ${{ !inputs.dry_run && !inputs.community_pr_only }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          # Categorisation comes from .github/release.yml.
          gh release create "$VERSION" \
            --title "$VERSION" \
            --target "$GITHUB_SHA" \
            --generate-notes

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        env:
          VERSION: ${{ inputs.version }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          {
            echo "## Dry run — nothing was pushed"
            echo ""
            echo "Would have:"
            echo "- pushed annotated tag \`$VERSION\` at \`$GITHUB_SHA\`"
            echo "- ensured maintenance branch \`$BRANCH\` exists at the same SHA"
            echo "- created a GitHub Release with auto-generated notes"
            echo "- opened a PR against \`duckdb/community-extensions\` (separate job)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Community PR retry summary
        if: ${{ inputs.community_pr_only }}
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_SHA: ${{ steps.existing_tag.outputs.sha }}
        run: |
          {
            echo "## Community PR retry"
            echo ""
            echo "Will retry the \`duckdb/community-extensions\` PR for existing tag \`$VERSION\` at \`$RELEASE_SHA\`."
            echo "No tags, branches, or GitHub Releases will be created in this repository."
          } >> "$GITHUB_STEP_SUMMARY"

  community-pr:
    name: Open community-extensions PR
    needs: release
    if: ${{ !inputs.dry_run && !inputs.skip_community_pr }}
    runs-on: ubuntu-latest
    steps:
      - name: Check community bot token is configured
        env:
          TOKEN: ${{ secrets.COMMUNITY_BOT_TOKEN }}
        run: |
          if [[ -z "$TOKEN" ]]; then
            echo "::error::COMMUNITY_BOT_TOKEN is not set. See docs/decisions/0013-versioning-and-release-automation.md for the one-time setup steps, or re-run with skip_community_pr: true."
            exit 1
          fi

      - name: Clone community-extensions
        env:
          GH_TOKEN: ${{ secrets.COMMUNITY_BOT_TOKEN }}
        run: |
          set -euo pipefail
          # Clone upstream for the edit, then push the PR branch to the
          # token owner's fork.
          gh auth setup-git
          BOT_LOGIN="$(gh api user --jq .login)"
          echo "BOT_LOGIN=$BOT_LOGIN" >> "$GITHUB_ENV"

          git clone "https://github.com/duckdb/community-extensions.git" community-extensions
          cd community-extensions
          git remote rename origin upstream
          git remote add origin "https://github.com/$BOT_LOGIN/community-extensions.git"
          if ! git ls-remote --exit-code origin >/dev/null 2>&1; then
            echo "::error::COMMUNITY_BOT_TOKEN belongs to '$BOT_LOGIN', but https://github.com/$BOT_LOGIN/community-extensions.git is not reachable. Create a fork of duckdb/community-extensions for that account and grant the token contents: write on the fork."
            exit 1
          fi

      - name: Update extension descriptor
        working-directory: community-extensions
        env:
          VERSION: ${{ needs.release.outputs.tag }}
          RELEASE_SHA: ${{ needs.release.outputs.release_sha }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          mkdir -p "extensions/$EXTENSION_NAME"
          DESCRIPTOR="extensions/$EXTENSION_NAME/description.yml"
          # Community descriptors carry the SemVer without the 'v' prefix.
          STRIPPED_VERSION="${VERSION#v}"

          if [[ -f "$DESCRIPTOR" ]]; then
            # Update only the moving fields. Anything else (maintainers,
            # description, build flags, etc.) is left untouched and stays
            # under the maintainer's control.
            DESCRIPTOR="$DESCRIPTOR" \
            STRIPPED_VERSION="$STRIPPED_VERSION" \
            RELEASE_SHA="$RELEASE_SHA" \
            python3 <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path(os.environ["DESCRIPTOR"])
          version = os.environ["STRIPPED_VERSION"]
          sha = os.environ["RELEASE_SHA"]

          text = path.read_text()
          text = re.sub(
              r'(?m)^(\s*version:\s*)["\']?[^"\'\n]+["\']?',
              lambda m: f'{m.group(1)}"{version}"',
              text,
              count=1,
          )
          text = re.sub(
              r'(?m)^(\s*ref:\s*)["\']?[0-9a-f]{7,40}["\']?',
              lambda m: f'{m.group(1)}"{sha}"',
              text,
              count=1,
          )
          path.write_text(text)
          PY
          else
            cat > "$DESCRIPTOR" <<EOF
          extension:
            name: $EXTENSION_NAME
            description: "Stream changes from your DuckLake — durable consumer cursors, single-reader windows, typed DDL events."
            version: "$STRIPPED_VERSION"
            language: C++
            build: cmake
            license: Apache-2.0
            excluded_platforms: ""
            requires_toolchains: ""
            maintainers:
              - "$ACTOR"

          repo:
            github: "$REPO"
            ref: "$RELEASE_SHA"
          EOF
            echo "::warning::Created a new descriptor at $DESCRIPTOR. Review and adjust the maintainer list and description before merging the community PR."
          fi

          cat "$DESCRIPTOR"

      - name: Configure git for the bot
        working-directory: community-extensions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit, push, and open PR
        working-directory: community-extensions
        env:
          GH_TOKEN: ${{ secrets.COMMUNITY_BOT_TOKEN }}
          VERSION: ${{ needs.release.outputs.tag }}
          RELEASE_SHA: ${{ needs.release.outputs.release_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "${{ inputs.community_pr_only }}" == "true" ]]; then
            BRANCH="${EXTENSION_NAME}-${VERSION}-retry-${GITHUB_RUN_ID}"
          else
            BRANCH="${EXTENSION_NAME}-${VERSION}"
          fi
          git checkout -b "$BRANCH"
          git add "extensions/$EXTENSION_NAME/description.yml"
          git commit -m "$EXTENSION_NAME: $VERSION"
          git push -u origin "HEAD:$BRANCH"

          cat > /tmp/community-pr-body.md <<EOF
          Automated descriptor update for [$REPO@$VERSION](https://github.com/$REPO/releases/tag/$VERSION).

          Release SHA: \`$RELEASE_SHA\`

          Generated by [.github/workflows/release.yml](https://github.com/$REPO/blob/$RELEASE_SHA/.github/workflows/release.yml).
          EOF

          gh pr create \
            --repo duckdb/community-extensions \
            --base main \
            --head "$BOT_LOGIN:$BRANCH" \
            --title "$EXTENSION_NAME: $VERSION" \
            --body-file /tmp/community-pr-body.md

#
# Light CI for in-flight feature branches.
#
# Goal: a tight feedback loop on every push to a non-main branch that
# catches the failure modes a developer hits hours-to-days before they
# open a PR (broken format, broken tidy diff, extension fails to load,
# the smoke test no longer passes), without burning the full DuckDB
# extension matrix on every keystroke.
#
# Triggers exclude `main` and `release/*` because those branches run
# `full-ci.yml`. Pull requests are *not* triggered here either — when a
# branch is PR'd into `main`, full CI runs against the merge ref. Light
# CI is intentionally a "private" signal for the feature-branch author.
#
# See docs/decisions/0012-branching-ci-release.md and
# docs/decisions/0013-versioning-and-release-automation.md.

name: Light CI

on:
  push:
    branches-ignore:
      - main
      - 'release/**'
      - 'gh-readonly-queue/**'

concurrency:
  group: light-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-and-tidy:
    name: Format + Tidy
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5.1
    with:
      duckdb_version: v1.5.1
      ci_tools_version: v1.5.1
      extension_name: ducklake_cdc
      format_checks: 'format;tidy'

  linux-debug-smoke:
    name: Linux debug + smoke
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      GEN: ninja
      VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
      VCPKG_TARGET_TRIPLET: x64-linux
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build ccache

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: light-ci-ccache-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'extension_config.cmake', 'vcpkg.json') }}-${{ github.ref }}
          restore-keys: |
            light-ci-ccache-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'extension_config.cmake', 'vcpkg.json') }}-
            light-ci-ccache-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35

      - name: Build (debug)
        run: |
          export CCACHE_DIR=~/.ccache
          ccache -M 2G
          make debug
          ccache -s

      - name: Smoke test (extension loads, cdc_version returns)
        run: |
          # The single canary test under test/sql/ducklake_cdc.test asserts
          # the extension loads and `cdc_version()` returns the expected
          # build-stamp prefix. Failing it means the build artifact is
          # broken in a way that would block merging into main.
          build/debug/test/unittest --test-dir . "test/sql/ducklake_cdc.test"

      - name: Python smoke probes
        run: |
          uv run --locked python test/smoke/compat_warning_smoke.py
          uv run --locked python test/smoke/lease_multiconn_smoke.py
          uv run --locked python test/smoke/cdc_wait_interrupt_smoke.py
          uv run --locked python test/smoke/toctou_expire_smoke.py

      - name: Catalog matrix smoke
        run: |
          docker compose -f test/catalog_matrix/docker-compose.yml up -d --wait
          trap 'docker compose -f test/catalog_matrix/docker-compose.yml down -v' EXIT
          uv run --locked python test/catalog_matrix/catalog_matrix_smoke.py --backends duckdb sqlite postgres

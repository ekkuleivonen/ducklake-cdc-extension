#
# Full CI gate for `main`.
#
# Runs the upstream DuckDB extension distribution + code-quality matrix.
# This workflow is what branch protection on `main` requires (via the
# single `ci-pass` aggregator job, so adding/removing matrix legs in
# the upstream reusable workflows does not require touching the branch
# protection rule). Triggers are deliberately narrow:
#
# - `pull_request` targeting `main` (and `release/*` for maintenance
#   patches) — every change must pass full CI before merge.
# - `push` to `main` and `release/*` — sanity check after merge.
# - `push` of `v*` tags — release artifact validation.
# - `merge_group` — required for GitHub merge queue compatibility.
# - `workflow_dispatch` — manual re-run from the Actions UI.
#
# See docs/decisions/0012-branching-ci-release.md and
# docs/decisions/0013-versioning-and-release-automation.md.

name: Full CI

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  push:
    branches:
      - main
      - 'release/**'
    tags:
      - 'v*'
  merge_group:
  workflow_dispatch:

concurrency:
  group: full-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.1
    with:
      duckdb_version: v1.5.1
      ci_tools_version: v1.5.1
      extension_name: ducklake_cdc

  code-quality-check:
    name: Code Quality Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5.1
    with:
      duckdb_version: v1.5.1
      ci_tools_version: v1.5.1
      extension_name: ducklake_cdc
      format_checks: 'format;tidy'

  upstream-contract-check:
    name: Upstream DuckLake contract check
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: test/uv.lock

      - name: Check DuckLake changes-map reference
        run: |
          cd test
          uv run --locked python upstream/enumerate_changes_map.py --check

  # Stable status check name that branch protection should require. As long
  # as both upstream reusable workflows and local contract checks succeed,
  # this job succeeds. If one of them adds or renames matrix legs, branch
  # protection does not need any
  # update.
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs:
      - duckdb-stable-build
      - code-quality-check
      - upstream-contract-check
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        env:
          BUILD_RESULT: ${{ needs.duckdb-stable-build.result }}
          QUALITY_RESULT: ${{ needs.code-quality-check.result }}
          UPSTREAM_RESULT: ${{ needs.upstream-contract-check.result }}
        run: |
          echo "duckdb-stable-build:    $BUILD_RESULT"
          echo "code-quality-check:     $QUALITY_RESULT"
          echo "upstream-contract-check: $UPSTREAM_RESULT"
          if [[ "$BUILD_RESULT" != "success" || "$QUALITY_RESULT" != "success" || "$UPSTREAM_RESULT" != "success" ]]; then
            echo "::error::Full CI did not pass."
            exit 1
          fi

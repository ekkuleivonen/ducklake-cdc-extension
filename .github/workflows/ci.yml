#
# Day-to-day CI for ducklake_cdc. Runs on every push and PR. Stays cheap on
# purpose — single-platform Linux release build, format/tidy, smoke probes,
# and the upstream DuckLake contract check.
#
# The full DuckDB extension distribution matrix (every OS / arch / Wasm
# triplet) is intentionally NOT here: it's a release gate inside
# `release.yml`, since that is the only time we actually ship binaries to
# every platform. Running the matrix on every PR was ~30 minutes of
# Actions time per push for no day-to-day signal we don't already get
# from a Linux build.
#

name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'bench/results/**'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'bench/results/**'
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  resolve-duckdb-version:
    name: Resolve DuckDB version
    runs-on: ubuntu-latest
    outputs:
      duckdb_version: ${{ steps.read.outputs.duckdb_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
      - id: read
        run: echo "duckdb_version=$(cat .github/duckdb-version)" >> "$GITHUB_OUTPUT"

  code-quality-check:
    name: Code Quality Check
    needs: resolve-duckdb-version
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5.1
    with:
      duckdb_version: ${{ needs.resolve-duckdb-version.outputs.duckdb_version }}
      ci_tools_version: v1.5.1
      extension_name: ducklake_cdc
      format_checks: 'format;tidy'

  integration-smoke:
    name: Integration smoke (Linux release)
    needs: resolve-duckdb-version
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      GEN: ninja
      VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
      VCPKG_TARGET_TRIPLET: x64-linux
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build ccache

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ci-ccache-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'extension_config.cmake', 'vcpkg.json', '.github/duckdb-version') }}-${{ github.ref }}
          restore-keys: |
            ci-ccache-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'extension_config.cmake', 'vcpkg.json', '.github/duckdb-version') }}-
            ci-ccache-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35

      - name: Build (release)
        # Release build matches DuckLake's own CI: no ASAN, so the unittest
        # binary can LOAD the official prebuilt DuckLake extension at runtime
        # without the sanitizer-runtime mismatch you get when loading
        # non-ASAN shared libraries into an ASAN-built host binary.
        run: |
          export CCACHE_DIR=~/.ccache
          ccache -M 2G
          make release
          ccache -s

      - name: SQL tests (smoke + default)
        # `make prepare_tests` (a prerequisite of test_release_*) curls the
        # official `ducklake.duckdb_extension` for the pinned DuckDB version
        # into ~/.duckdb/extensions/<version>/<platform>/ so the
        # `INSTALL ducklake; LOAD ducklake;` in our SQL tests resolves from
        # disk instead of going over HTTP. Going over HTTP at test time
        # silently turns failing tests into green-skipped ones via
        # sqllogictest's default "skip on error_message matching 'HTTP'"
        # rule, which is the worst kind of CI lie.
        run: make test_release_default

      - name: Python smoke probes
        run: |
          uv run --locked python test/smoke/compat_warning_smoke.py
          uv run --locked python test/smoke/lease_multiconn_smoke.py
          uv run --locked python test/smoke/cdc_wait_interrupt_smoke.py
          uv run --locked python test/smoke/toctou_expire_smoke.py

      # Republish the built ducklake_cdc.duckdb_extension under the same
      # name the full distribution matrix used to produce, so benchmark.yml
      # (and any other workflow that wants a binary from a successful CI
      # run) keeps working without rebuilding from source.
      - name: Upload linux_amd64 extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: ducklake_cdc-${{ needs.resolve-duckdb-version.outputs.duckdb_version }}-extension-linux_amd64
          path: build/release/extension/ducklake_cdc/ducklake_cdc.duckdb_extension
          if-no-files-found: error
          retention-days: 14

      - name: Catalog matrix smoke (DuckDB / SQLite / Postgres)
        # Phase 2's portability gate: the Phase 1 cursor-loop semantics must
        # hold against every catalog backend DuckLake supports. The earlier
        # follow-up flag (post-DDL `cdc_changes` returning the OLD schema
        # against runtime-installed DuckLake) was a Bind-time probe-snapshot
        # bug — the probe was anchored at `last_committed_snapshot + 1`
        # instead of mirroring `ReadWindow`'s actual end-snapshot computation,
        # so the bind could pick the wrong column set when schema boundaries
        # truncated the runtime range. The probe now mirrors `ReadWindow`
        # read-only; see `CdcChangesBind` in `src/dml.cpp`.
        run: |
          docker compose -f test/catalog_matrix/docker-compose.yml up -d --wait
          trap 'docker compose -f test/catalog_matrix/docker-compose.yml down -v' EXIT
          uv run --locked python test/catalog_matrix/catalog_matrix_smoke.py --backends duckdb sqlite postgres

  upstream-contract-check:
    name: Upstream DuckLake contract check
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check DuckLake changes-map reference
        run: |
          uv run --locked python test/upstream/enumerate_changes_map.py --check

  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs:
      - code-quality-check
      - integration-smoke
      - upstream-contract-check
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        env:
          QUALITY_RESULT: ${{ needs.code-quality-check.result }}
          INTEGRATION_RESULT: ${{ needs.integration-smoke.result }}
          UPSTREAM_RESULT: ${{ needs.upstream-contract-check.result }}
        run: |
          echo "code-quality-check:      $QUALITY_RESULT"
          echo "integration-smoke:       $INTEGRATION_RESULT"
          echo "upstream-contract-check: $UPSTREAM_RESULT"
          if [[ "$QUALITY_RESULT" != "success" \
              || "$INTEGRATION_RESULT" != "success" \
              || "$UPSTREAM_RESULT" != "success" ]]; then
            echo "::error::CI did not pass."
            exit 1
          fi

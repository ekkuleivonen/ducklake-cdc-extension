# Catalog backends for the DuckLake changes-map upstream probe.
#
# Non-default port so we don't conflict with system Postgres:
#   postgres → localhost:5433
#
# Usage:
#   docker compose up -d
#   cd .. && uv run python upstream/enumerate_changes_map.py --backends duckdb sqlite postgres
#   docker compose down -v   # clean up between runs

services:
  postgres:
    image: postgres:latest
    container_name: dlcdc-upstream-postgres
    environment:
      POSTGRES_USER: ducklake
      POSTGRES_PASSWORD: ducklake
      POSTGRES_DB: ducklake
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ducklake -d ducklake"]
      interval: 2s
      timeout: 3s
      retries: 20

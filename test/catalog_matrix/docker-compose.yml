# Catalog backend fixture for the Phase 2 ducklake-cdc catalog matrix.
#
# Non-default port so it can run beside the upstream contract probe fixture:
#   postgres -> localhost:5434
#
# Usage:
#   docker compose -f test/catalog_matrix/docker-compose.yml up -d --wait
#   uv run python test/catalog_matrix/catalog_matrix_smoke.py --backends duckdb sqlite postgres
#   docker compose -f test/catalog_matrix/docker-compose.yml down -v

services:
  postgres:
    image: postgres:latest
    container_name: dlcdc-catalog-matrix-postgres
    environment:
      POSTGRES_USER: ducklake
      POSTGRES_PASSWORD: ducklake
      POSTGRES_DB: ducklake
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ducklake -d ducklake"]
      interval: 2s
      timeout: 3s
      retries: 20

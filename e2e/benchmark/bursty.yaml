# Real-world spiky traffic — combines wide intra-commit batch variance
# (`batch_min..batch_max` 10..1000) with the producer's `variate` gap
# profile (random inter-commit jitter). Tests how quickly the
# consumer's adaptive `max_snapshots` window recovers after a burst:
# during quiet stretches latency should be near `latency.yaml`'s floor;
# during storms throughput should approach `throughput.yaml`'s ceiling.
name: bursty
duration_seconds: 60
schemas: 1
tables_per_schema: 4
target_snapshots_per_second: 2
target_rows_per_snapshot: 250    # 500 rows/s average; bursts swing ±2×
consumers_per_table: 2
producer_workers: 2
update_percent: 30
delete_percent: 15
batch_min: 10                    # ←
batch_max: 1000                  # ←  100× spread = bursty within commits
max_snapshots: 100
profile: variate                 # ←  random gap weights = bursty between commits

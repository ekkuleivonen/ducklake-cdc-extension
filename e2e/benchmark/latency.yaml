# Per-commit latency floor — many tiny commits, no coalescing. Measures
# the irreducible cost of "snapshot committed → row visible to a sink".
# Tightening `max_snapshots` forbids the consumer from batching listens,
# so p50/p99 here should be the lowest of any profile. If they aren't,
# the listen path has fixed costs that don't amortize.
name: latency
duration_seconds: 30
schemas: 1
tables_per_schema: 1
target_snapshots_per_second: 5
target_rows_per_snapshot: 1
consumers_per_table: 1
producer_workers: 1
update_percent: 25
delete_percent: 10
batch_min: 1
batch_max: 1
max_snapshots: 1                 # one snapshot per listen — no coalescing
profile: flat

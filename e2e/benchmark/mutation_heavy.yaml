# Update + delete dominated — exercises the `update_preimage` emission
# and delete CDC paths, which are heavier than appends because rows
# must be located before being modified. `update_percent` and
# `delete_percent` are percents of *inserted* rows (see producer.py),
# so 80/40 means total actions ≈ 2.2× inserts with a mutation-heavy
# CDC stream. Watch the per-table panel's `~` and `−` columns and
# whether the `client` segment of the stage bar widens vs `light`.
name: mutation_heavy
duration_seconds: 60
schemas: 1
tables_per_schema: 2
target_snapshots_per_second: 2
target_rows_per_snapshot: 200    # 400 rows/s — modest, the mix is the point
consumers_per_table: 1
producer_workers: 2
update_percent: 80               # most inserted rows get re-touched
delete_percent: 40               # and many get deleted
batch_min: 50
batch_max: 200
max_snapshots: 50
profile: flat

; Pool connections for DuckLake benchmark (many DuckDB client conns -> bounded server conns).
[databases]
ducklake = host=postgres port=5432 user=ducklake password=ducklake dbname=ducklake

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 2000
default_pool_size = 100
; Keep pools lazy. Headless demos reset the catalog by dropping/recreating the
; ducklake database through the direct Postgres port; eager server connections
; can race that reset and make PgBouncer cache "database does not exist".
min_pool_size = 0
reserve_pool_size = 50
ignore_startup_parameters = extra_application_name,search_path
